models:
  xgboost:
    family: XGBoost
    package: xgboost
    optional: true
    objective: binary:logistic
    eval_metric: logloss
    n_estimators: 25
    max_depth: 3
    learning_rate: 0.1
    n_jobs: 1
  lightgbm:
    family: LightGBM
    package: lightgbm
    optional: true
    objective: binary
    n_estimators: 50
    max_depth: -1
    learning_rate: 0.1
    min_child_samples: 1
    min_data_in_leaf: 1
    n_jobs: 1
    verbose: -1
